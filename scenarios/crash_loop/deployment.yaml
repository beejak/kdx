apiVersion: apps/v1
kind: Deployment
metadata:
  name: crash-demo
  namespace: kdx-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crash-demo
  template:
    metadata:
      labels:
        app: crash-demo
    spec:
      containers:
        - name: crasher
          image: busybox:1.36
          command: ["sh", "-c", "echo 'ERROR: cannot connect to db:5432' >&2; exit 1"]
          resources:
            requests:
              memory: "32Mi"
            limits:
              memory: "64Mi"
