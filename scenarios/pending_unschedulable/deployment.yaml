apiVersion: apps/v1
kind: Deployment
metadata:
  name: pending-demo
  namespace: kdx-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pending-demo
  template:
    metadata:
      labels:
        app: pending-demo
    spec:
      nodeSelector:
        disktype: ssd
      containers:
        - name: app
          image: nginx:1.25
          resources:
            requests:
              memory: "32Mi"
